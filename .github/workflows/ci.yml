name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  build-and-test:
    name: Build & Test (Node ${{ matrix.node-version }})
    runs-on: ubuntu-latest
    strategy:
      matrix:
        node-version: [20, 22]

    steps:
      - name: Checkout code
        uses: actions/checkout@v6

      - name: Setup pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 9

      - name: Setup Node.js ${{ matrix.node-version }}
        uses: actions/setup-node@v4
        with:
          node-version: ${{ matrix.node-version }}
          cache: pnpm

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Build all packages
        run: pnpm -r --stream run build

      - name: Verify build output
        run: |
          echo "=== Workspace packages ==="
          pnpm -r exec -- pwd
          echo "=== claude-plugin dist ==="
          find packages/claude-plugin/dist -type f -name '*.js' | sort || echo "WARNING: No claude-plugin dist found!"
          if [ ! -f packages/claude-plugin/dist/scripts/session-start.js ]; then
            echo "=== Rebuilding claude-plugin explicitly ==="
            pnpm --filter @ctxl/claude-plugin... run build
            echo "=== After explicit rebuild ==="
            find packages/claude-plugin/dist -type f -name '*.js' | sort || echo "STILL NO DIST!"
          fi

      - name: Run linting
        run: pnpm lint

      - name: Configure git for E2E tests
        run: |
          git config --global user.name "github-actions[bot]"
          git config --global user.email "github-actions[bot]@users.noreply.github.com"

      - name: Run integration tests
        run: pnpm test

      - name: Run E2E tests
        run: pnpm test:e2e

  typecheck:
    name: Type Check
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v6

      - name: Setup pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 9

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: pnpm

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Build all packages (generates .d.ts for cross-package type resolution)
        run: pnpm build

      - name: Run type checking across all packages
        run: pnpm -r exec tsc --noEmit
